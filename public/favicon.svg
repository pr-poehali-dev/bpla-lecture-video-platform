<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" fill="#050810"/>

  <!-- Центральный корпус -->
  <rect x="28" y="28" width="8" height="8" rx="1" fill="#00f5ff"/>

  <!-- Крест-рама (4 луча) -->
  <rect x="30" y="12" width="4" height="16" rx="1" fill="#00f5ff"/>
  <rect x="30" y="36" width="4" height="16" rx="1" fill="#00f5ff"/>
  <rect x="12" y="30" width="16" height="4" rx="1" fill="#00f5ff"/>
  <rect x="36" y="30" width="16" height="4" rx="1" fill="#00f5ff"/>

  <!-- 4 мотора по углам -->
  <circle cx="14" cy="14" r="5" fill="none" stroke="#00f5ff" stroke-width="2"/>
  <circle cx="50" cy="14" r="5" fill="none" stroke="#00f5ff" stroke-width="2"/>
  <circle cx="14" cy="50" r="5" fill="none" stroke="#00f5ff" stroke-width="2"/>
  <circle cx="50" cy="50" r="5" fill="none" stroke="#00f5ff" stroke-width="2"/>

  <!-- Точки моторов -->
  <circle cx="14" cy="14" r="2" fill="#00f5ff"/>
  <circle cx="50" cy="14" r="2" fill="#00f5ff"/>
  <circle cx="14" cy="50" r="2" fill="#00f5ff"/>
  <circle cx="50" cy="50" r="2" fill="#00f5ff"/>

  <!-- Диагональные стойки -->
  <line x1="18" y1="18" x2="28" y2="28" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="46" y1="18" x2="36" y2="28" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="18" y1="46" x2="28" y2="36" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="46" y1="46" x2="36" y2="36" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.6"/>
</svg>
